<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox Chat Bypass</title>
</head>
<body>
<div id="tilda-chat-wrapper">
    <div id="tilda-chat-log"></div>
    <div id="tilda-chat-input-zone">
        <input type="text" id="tilda-chat-input" placeholder="Type text here..." />
        <button id="tilda-chat-send">Отправить</button>
    </div>
</div>

<style>
    body { background-color: #111; padding: 0; margin: 0; }
    #tilda-chat-wrapper {
        max-width: 500px;
        margin: 50px auto;
        background: rgba(0, 0, 0, 0.85);
        border-radius: 8px;
        padding: 15px;
        font-family: Arial, sans-serif;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    #tilda-chat-log {
        height: 300px;
        overflow-y: auto;
        border-bottom: 1px solid #444;
        padding-bottom: 10px;
        margin-bottom: 10px;
        color: #fff;
    }
    .chat-msg {
        margin: 4px 0;
        line-height: 1.4;
        font-weight: bold;
    }
    .msg-system { color: #ffd700; }
    .msg-player { color: #ffffff; }
    #tilda-chat-input-zone {
        display: flex;
        gap: 10px;
    }
    #tilda-chat-input {
        flex: 1;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #444;
        padding: 10px;
        color: #fff;
        border-radius: 6px;
        font-size: 14px;
    }
    #tilda-chat-send {
        background: #555;
        color: #fff;
        border: none;
        padding: 0 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }
    #tilda-chat-send:hover { background: #777; }
</style>

<script>
    const chatLog = document.getElementById('tilda-chat-log');
    const chatInput = document.getElementById('tilda-chat-input');
    const sendBtn = document.getElementById('tilda-chat-send');

    function appendMessage(text, type) {
        const msg = document.createElement('div');
        msg.className = 'chat-msg ' + (type ? 'msg-' + type : '');
        msg.innerText = text;
        chatLog.appendChild(msg);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    appendMessage('System: Чат запущен на GitHub Pages. Ожидание бэкенда...', 'system');

    function sendWebMessage() {
        const text = chatInput.value.trim();
        if(text === '') return;
        appendMessage('WebUser: ' + text, 'player');
        chatInput.value = '';
    }

    sendBtn.addEventListener('click', sendWebMessage);
    chatInput.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') sendWebMessage();
    });
</script>
</body>
</html>
